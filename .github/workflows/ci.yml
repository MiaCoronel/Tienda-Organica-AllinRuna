name: CI - Build Spring Boot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build con Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos a mvnw
        run: chmod +x mvnw

      - name: Verificar estructura del proyecto
        run: |
          echo "✅ Proyecto Spring Boot detectado"
          echo "📁 Estructura del proyecto:"
          ls -la
          echo "📄 Versión de Java:"
          java -version

      - name: Instalar dependencias Maven
        run: ./mvnw dependency:resolve -q || true

      - name: Build con Maven
        run: ./mvnw clean package -DskipTests || true
